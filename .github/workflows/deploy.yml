name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Generate Firebase config
        run: |
          echo '{
            "apiKey": "${{ secrets.VITE_FIREBASE_API_KEY }}",
            "authDomain": "${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}",
            "projectId": "${{ secrets.VITE_FIREBASE_PROJECT_ID }}",
            "storageBucket": "${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}",
            "messagingSenderId": "${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}",
            "appId": "${{ secrets.VITE_FIREBASE_APP_ID }}",
            "firestoreDatabaseId": "${{ secrets.VITE_FIREBASE_DATABASE_ID }}"
          }' > firebase-applet-config.json
      - name: Build
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
